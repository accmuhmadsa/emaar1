<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- SEO & Bilingual Metadata -->
  <title>مؤسسة إعمار أرم للمقاولات | Emaar Iram Contracting</title>
  <meta name="description" content="مؤسسة إعمار أرم للمقاولات - نبني الجودة ونصنع الثقة. خدمات بناء وتشطيبات وصيانة في السعودية. Building Quality, Creating Trust in Saudi Arabia.">
  <meta name="keywords" content="إعمار أرم, مقاولات, بناء, تشطيبات, صيانة, السعودية, Emaar Iram, Contracting, Construction, Saudi Arabia">
  <meta name="author" content="Emaar Iram Contracting Establishment">
  <!-- Google Fonts for premium look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --blue: #0A2C4E; /* deep premium blue */
      --light-gray: #F0F2F5;
      --white: #FFFFFF;
      --dark-text: #1E293B;
      --soft-gray: #E2E8F0;
      --accent-blue: #1E4A6B;
      --golden-touch: #C9A84C; /* subtle accent for luxury */
      --transition: all 0.3s ease;
    }
    body {
      font-family: 'Cairo', 'Poppins', sans-serif;
      background-color: var(--white);
      color: var(--dark-text);
      line-height: 1.6;
      overflow-x: hidden;
    }
    /* RTL / LTR direction handling */
    html[dir="rtl"] body {
      text-align: right;
      font-family: 'Cairo', sans-serif;
    }
    html[dir="ltr"] body {
      text-align: left;
      font-family: 'Poppins', sans-serif;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }
    /* Smooth animations */
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-on-scroll {
      animation: fadeUp 0.8s ease forwards;
    }
    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 40px;
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
      font-size: 1rem;
      letter-spacing: 0.3px;
      cursor: pointer;
      border: none;
      background-color: var(--blue);
      color: white;
      box-shadow: 0 8px 20px rgba(10, 44, 78, 0.2);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--white);
      color: var(--white);
      box-shadow: none;
    }
    .btn-outline:hover {
      background: var(--white);
      color: var(--blue);
    }
    .btn-whatsapp {
      background: #25D366;
      color: white;
      box-shadow: 0 8px 18px rgba(37, 211, 102, 0.3);
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(10, 44, 78, 0.25);
    }
    /* Header & Navigation */
    header {
      background: var(--white);
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.05);
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.9);
    }
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-text {
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--blue);
      letter-spacing: -0.5px;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      align-items: center;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--dark-text);
      font-weight: 600;
      font-size: 1rem;
      transition: color 0.3s;
    }
    .nav-links a:hover {
      color: var(--blue);
    }
    .lang-switch {
      background: var(--light-gray);
      border-radius: 30px;
      padding: 8px 20px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--blue);
    }
    /* Hero Section */
    .hero {
      background: linear-gradient(rgba(10,44,78,0.75), rgba(10,44,78,0.8)), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" fill="none"><path d="M0 0h1440v600H0z" fill="%230A2C4E"/><path d="M0 450l60-20c60-20 180-60 300-50s240 50 360 70 180 20 240 0l60-20v170H0z" fill="%23F0F2F5" opacity="0.1"/></svg>') center/cover no-repeat;
      min-height: 75vh;
      display: flex;
      align-items: center;
      color: white;
    }
    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 24px;
      width: 100%;
    }
    .hero h1 {
      font-size: 3.2rem;
      font-weight: 800;
      line-height: 1.3;
    }
    .hero .slogan {
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--golden-touch);
    }
    .hero-buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    /* Sections */
    section {
      padding: 70px 0;
    }
    .section-title {
      font-size: 2.3rem;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 30px;
      text-align: center;
    }
    .services-grid, .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }
    .service-card {
      background: var(--white);
      padding: 40px 24px;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
      transition: var(--transition);
      text-align: center;
      border: 1px solid var(--soft-gray);
    }
    .service-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 25px 40px rgba(10,44,78,0.12);
    }
    .service-icon {
      font-size: 3rem;
      color: var(--golden-touch);
      margin-bottom: 20px;
    }
    .service-card h3 {
      font-size: 1.4rem;
      color: var(--blue);
      margin-bottom: 12px;
    }
    /* Stats */
    .stats-section {
      background: var(--light-gray);
    }
    .stat-item {
      background: var(--blue);
      color: white;
      padding: 35px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(10,44,78,0.15);
    }
    .stat-number {
      font-size: 3rem;
      font-weight: 800;
      color: var(--golden-touch);
      margin-bottom: 5px;
    }
    /* Contact Form */
    .contact-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 40px;
      align-items: start;
    }
    .contact-form input, .contact-form textarea {
      width: 100%;
      padding: 14px 20px;
      border-radius: 30px;
      border: 1px solid var(--soft-gray);
      margin-bottom: 15px;
      background: var(--light-gray);
      font-family: inherit;
      outline: none;
    }
    .contact-form textarea {
      border-radius: 20px;
      height: 120px;
      resize: none;
    }
    .contact-form input:focus, .contact-form textarea:focus {
      border-color: var(--blue);
    }
    /* Footer */
    footer {
      background: var(--blue);
      color: white;
      padding: 40px 0 20px;
      text-align: center;
    }
    .footer-text {
      margin-bottom: 15px;
      opacity: 0.8;
    }
    /* Language visibility utility */
    [lang="en"] { display: none; }
    html[dir="ltr"] [lang="ar"] { display: none; }
    html[dir="ltr"] [lang="en"] { display: block; }
    html[dir="rtl"] [lang="en"] { display: none; }
    html[dir="rtl"] [lang="ar"] { display: block; }

    @media (max-width: 768px) {
      .nav-bar { flex-direction: column; gap: 15px; }
      .nav-links { gap: 15px; }
      .hero h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container nav-bar">
      <div class="logo-area">
        <span class="logo-text">
          <span lang="ar">إعمار أرم</span>
          <span lang="en">Emaar Iram</span>
        </span>
      </div>
      <ul class="nav-links">
        <li><a href="#services"><span lang="ar">خدماتنا</span><span lang="en">Services</span></a></li>
        <li><a href="#about"><span lang="ar">من نحن</span><span lang="en">About Us</span></a></li>
        <li><a href="#contact"><span lang="ar">اتصل بنا</span><span lang="en">Contact</span></a></li>
      </ul>
      <button class="lang-switch" onclick="toggleLanguage()">
        <i class="fa-solid fa-globe"></i>
        <span id="lang-btn-text">English</span>
      </button>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container hero-content">
      <h1>
        <span lang="ar">مؤسسة إعمار أرم للمقاولات</span>
        <span lang="en">Emaar Iram Contracting</span>
      </h1>
      <p class="slogan">
        <span lang="ar">نبني الجودة ونصنع الثقة</span>
        <span lang="en">Building Quality, Creating Trust</span>
      </p>
      <div class="hero-buttons">
        <a href="#contact" class="btn"><span lang="ar">طلب اقتباس</span><span lang="en">Get a Quote</span></a>
        <a href="https://wa.me" class="btn btn-whatsapp" target="_blank">
          <i class="fa-brands fa-whatsapp"></i>
          <span lang="ar">تواصل عبر واتساب</span><span lang="en">WhatsApp Us</span>
        </a>
      </div>
    </div>
  </section>

  <!-- Services Section -->
  <section id="services" class="container">
    <h2 class="section-title">
      <span lang="ar">خدماتنا المتميزة</span>
      <span lang="en">Our Premium Services</span>
